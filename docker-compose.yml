services:
  postgres:
    image: postgres:16-alpine
    container_name: sourceviewer-postgres
    environment:
      POSTGRES_USER: sourceviewer
      POSTGRES_PASSWORD: sourceviewer
      POSTGRES_DB: sourceviewer
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sourceviewer -d sourceviewer"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sourceviewer-pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "test@hlag.com"
      PGADMIN_DEFAULT_PASSWORD: "admin"
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/pgadmin4/pgpass:ro

volumes:
  postgres-data:
  pgadmin-data: