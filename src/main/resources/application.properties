# ── Application ──────────────────────────────────────────────────────────────
quarkus.application.name=sourceviewer
quarkus.application.version=1.0.0-SNAPSHOT

# ── HTTP ──────────────────────────────────────────────────────────────────────
quarkus.http.port=8080
quarkus.http.cors=true

# ── Database ──────────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=sourceviewer
quarkus.datasource.password=sourceviewer
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/sourceviewer
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=20

# ── Flyway ────────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
quarkus.flyway.baseline-on-migrate=true

# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."com.hlag.sourceviewer".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n

# ── Dev Services (for mvn quarkus:dev and tests without docker compose) ───────
%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.datasource.devservices.image-name=postgres:16-alpine
%dev.quarkus.datasource.devservices.port=5432

%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.image-name=postgres:16-alpine

# ── Health ────────────────────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/health
