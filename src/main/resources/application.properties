# ── Application ──────────────────────────────────────────────────────────────
quarkus.application.name=sourceviewer
quarkus.application.version=1.0.0-SNAPSHOT

# ── HTTP ──────────────────────────────────────────────────────────────────────
quarkus.http.port=8080
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:8080
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,Accept
quarkus.http.cors.exposed-headers=Location
quarkus.http.cors.access-control-max-age=24H

# ── Database ──────────────────────────────────────────────────────────────────
quarkus.hibernate-orm.packages=com.hlag.sourceviewer
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=sourceviewer
quarkus.datasource.password=sourceviewer
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/sourceviewer
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=20

# ── Hibernate ORM ─────────────────────────────────────────────────────────────
# Flyway manages all schema migrations; Hibernate must not touch the schema.
quarkus.hibernate-orm.schema-management.strategy=none

# ── Flyway ────────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
quarkus.flyway.baseline-on-migrate=true

# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."com.hlag.sourceviewer".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n

# ── Dev Services ──────────────────────────────────────────────────────────────
# Use the docker-compose postgres (which has a named volume) instead of the
# ephemeral Testcontainers instance, so data survives dev-mode restarts.
%dev.quarkus.datasource.devservices.enabled=false

%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.image-name=postgres:16-alpine

# ── Health ────────────────────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/health

# ── OIDC (Bearer Token Validation) ────────────────────────────────────────────
# Service/bearer mode: Quarkus validates JWTs, the SPA drives the login flow.
# Override via QUARKUS_OIDC_AUTH_SERVER_URL / OIDC_CLIENT_ID env vars in production.
quarkus.oidc.application-type=service
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:http://localhost:9090/realms/sourceviewer}
quarkus.oidc.client-id=${OIDC_CLIENT_ID:sourceviewer-ui}
# Retry connecting to Keycloak for up to 30 s at startup (important in Docker
# where Keycloak may still be importing its realm when the app starts).
quarkus.oidc.connection-delay=PT30S

# Secure all /api/* endpoints; /api/config is explicitly permitted below
quarkus.http.auth.permission.authenticated.paths=/api/*
quarkus.http.auth.permission.authenticated.policy=authenticated
quarkus.http.auth.permission.public.paths=/api/config
quarkus.http.auth.permission.public.policy=permit

# Disable OIDC in tests so Quarkus does not try to reach Keycloak at startup
%test.quarkus.oidc.enabled=false
%test.quarkus.http.auth.permission.authenticated.enabled=false

# ── Repositories ──────────────────────────────────────────────────────────────
# Base directory for locally cloned Git repositories.
# If not set, defaults to <java.io.tmpdir>/sourceviewer-repos.
# sourceviewer.repos.base-path=/var/repos

# ── Secret Encryption ─────────────────────────────────────────────────────────
# Base64-encoded 32-byte (256-bit) AES key for encrypting Git credential secrets.
# Generate a production key with: openssl rand -base64 32
# Override via the SECRET_ENCRYPTION_KEY environment variable in production.
# The default below is a zero-key suitable for local development only.
sourceviewer.secret-encryption-key=${SECRET_ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
%test.sourceviewer.secret-encryption-key=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

# ── Frontend Runtime Config ────────────────────────────────────────────────────
# Exposed via GET /api/config so the frontend can read OIDC settings at runtime
# without a rebuild (useful in production to swap identity providers).
#
# FRONTEND_OIDC_AUTHORITY is the Keycloak URL the *browser* must reach.
# In Docker it differs from OIDC_AUTH_SERVER_URL (the container-internal URL
# used by the backend for JWT validation). Falls back to OIDC_AUTH_SERVER_URL
# when not set, so local dev requires no extra configuration.
frontend.oidc.authority=${FRONTEND_OIDC_AUTHORITY:${OIDC_AUTH_SERVER_URL:http://localhost:9090/realms/sourceviewer}}
frontend.oidc.client-id=${OIDC_CLIENT_ID:sourceviewer-ui}

# ── Scan Worker ────────────────────────────────────────────────────────────────
# How often the dispatcher checks for new queued scan jobs (requires restart to change).
# Parallelism (scan.max-parallel-jobs) is a runtime setting stored in the database.
sourceviewer.scan.tick-interval=2s

# ── Language Server Protocol ───────────────────────────────────────────────────
# Eclipse JDT Language Server (Java LSP)
sourceviewer.lsp.jdtls.launcher-jar=${JDTLS_LAUNCHER_JAR:/opt/jdtls/plugins/org.eclipse.equinox.launcher.jar}
sourceviewer.lsp.jdtls.config-dir=${JDTLS_CONFIG_DIR:/opt/jdtls/config_linux}
sourceviewer.lsp.jdtls.data-dir=${JDTLS_DATA_DIR:/tmp/sourceviewer-jdtls-workspace}
# TypeScript Language Server (typescript-language-server npm package)
sourceviewer.lsp.typescript.command=${TYPESCRIPT_LSP_COMMAND:typescript-language-server}
# Minutes of inactivity before an LSP server process is shut down
sourceviewer.lsp.inactive-timeout-minutes=60

# ── Classloader isolation for Maven Resolver ───────────────────────────────────
# Maven Resolver uses ServiceLoader internally. Quarkus's child-first classloading
# causes LinkageErrors when RepositorySystemSupplier (Quarkus CL) and its internal
# implementations (app CL) end up with different Class objects for shared SPI types.
# Parent-first forces all maven-resolver artifacts into one classloader.
quarkus.class-loading.parent-first-artifacts=\
  org.apache.maven.resolver:maven-resolver-api,\
  org.apache.maven.resolver:maven-resolver-spi,\
  org.apache.maven.resolver:maven-resolver-util,\
  org.apache.maven.resolver:maven-resolver-impl,\
  org.apache.maven.resolver:maven-resolver-named-locks,\
  org.apache.maven.resolver:maven-resolver-connector-basic,\
  org.apache.maven.resolver:maven-resolver-transport-file,\
  org.apache.maven.resolver:maven-resolver-transport-http,\
  org.apache.maven.resolver:maven-resolver-supplier,\
  org.apache.maven:maven-resolver-provider,\
  org.apache.maven:maven-model-builder,\
  org.apache.maven:maven-model,\
  org.apache.maven:maven-artifact,\
  org.apache.maven:maven-repository-metadata
