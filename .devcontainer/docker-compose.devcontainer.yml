# ─────────────────────────────────────────────────────────────────────────────
# Dev Container Compose file
#
# Starts four services:
#   • devcontainer  — development environment (JDK 25, Maven, Node.js, LSP)
#   • postgres      — PostgreSQL 16 (application database)
#   • pgadmin       — pgAdmin 4 (database management UI at localhost:9080)
#   • keycloak      — Keycloak 26.2 (OIDC identity provider)
#
# All services share the same bridge network (sourceviewer-net).  Quarkus inside
# the devcontainer reaches Postgres and Keycloak using their service names as
# hostnames.
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── Development container ─────────────────────────────────────────────────
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Project sources as a bind-mount into the container filesystem.
      # :z sets the SELinux label correctly — required for Podman on RHEL/Fedora.
      - ..:/workspace:z
      # Separate volume for the Maven local repository cache so that all
      # dependencies do not have to be re-downloaded on every container restart.
      - maven-cache:/root/.m2
      # Persist the JDTLS workspace (indexes, project data).
      - jdtls-workspace:/var/jdtls-workspace
    # The container runs as a daemon — IntelliJ connects via SSH/Gateway.
    command: sleep infinity
    environment:
      # ── Database (Quarkus env vars override application.properties)
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/sourceviewer
      QUARKUS_DATASOURCE_USERNAME: sourceviewer
      QUARKUS_DATASOURCE_PASSWORD: sourceviewer
      # ── OIDC (server-to-server: backend fetches JWKS via the internal service name)
      QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak:8080/realms/sourceviewer
      # ── OIDC issuer override
      # JWTs are issued with "iss": "http://localhost:9090/realms/sourceviewer"
      # because the browser accesses Keycloak via the host-exposed port.
      # Quarkus fetches the OIDC discovery document internally (keycloak:8080)
      # and would normally expect "iss=http://keycloak:8080/..." — a mismatch
      # that causes every API call to return 401 and triggers a redirect loop in
      # the frontend.  This override tells Quarkus which issuer to accept without
      # changing the internal discovery URL.
      # NOTE: do NOT set KC_HOSTNAME on the Keycloak service — that would make
      # Keycloak embed localhost:9090 into all OIDC endpoints, which Quarkus
      # (inside the container) cannot reach, causing a startup failure.
      QUARKUS_OIDC_TOKEN_ISSUER: http://localhost:9090/realms/sourceviewer
      # ── OIDC (browser: via the host-exposed port)
      FRONTEND_OIDC_AUTHORITY: http://localhost:9090/realms/sourceviewer
    # Forward the debug port 5005 and the app port 8080 to the host.
    ports:
      - "8080:8080"
      - "5005:5005"
    networks:
      - sourceviewer-net
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sourceviewer-postgres
    hostname: postgres
    environment:
      POSTGRES_USER: sourceviewer
      POSTGRES_PASSWORD: sourceviewer
      POSTGRES_DB: sourceviewer
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sourceviewer-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sourceviewer -d sourceviewer"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── pgAdmin ───────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sourceviewer-pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "test@hlag.com"
      PGADMIN_DEFAULT_PASSWORD: "admin"
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/pgadmin4/pgpass:ro
    networks:
      - sourceviewer-net

  # ── Keycloak ─────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: sourceviewer-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Do NOT set KC_HOSTNAME here.  If KC_HOSTNAME is set to the public URL
      # (localhost:9090), Keycloak embeds that URL into all OIDC endpoints in
      # the discovery document (jwks_uri, token_endpoint, …).  Quarkus fetches
      # those endpoints from inside the container where localhost:9090 is
      # unreachable, causing a startup failure.
      # The issuer mismatch (keycloak:8080 vs localhost:9090) is handled on the
      # Quarkus side via QUARKUS_OIDC_TOKEN_ISSUER above.
    ports:
      - "9090:8080"
    volumes:
      - ../keycloak/sourceviewer-realm.json:/opt/keycloak/data/import/sourceviewer-realm.json:ro
    networks:
      - sourceviewer-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  postgres-data:
  pgadmin-data:
  maven-cache:
  jdtls-workspace:

# ── Network ───────────────────────────────────────────────────────────────
# An explicit named network ensures that all services can reach each other
# by their service names regardless of the Docker Compose project name.
# Without this, the auto-generated default network name changes depending on
# how the stack is started (VS Code DevContainer, IntelliJ, manual
# docker/podman compose), which can prevent inter-container DNS resolution.
networks:
  sourceviewer-net:
    driver: bridge
